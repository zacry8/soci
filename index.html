<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soci Planner</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://cdn.simpleicons.org" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="login-screen">
      <div class="lc">
        <div class="lc-logo">Soci</div>
        <p class="lc-tagline">Content calendar for agencies</p>
        <form id="login-form" autocomplete="on">
          <div class="lc-field" id="l-name-wrap" hidden>
            <label for="l-name">Name</label>
            <input id="l-name" type="text" autocomplete="name" placeholder="Your name" />
          </div>
          <div class="lc-field" id="l-workspace-wrap" hidden>
            <label for="l-workspace">Workspace</label>
            <input id="l-workspace" type="text" placeholder="My Brand" />
          </div>
          <div class="lc-field">
            <label for="l-email">Email</label>
            <input id="l-email" type="email" autocomplete="username" placeholder="admin@example.com" required />
          </div>
          <div class="lc-field">
            <label for="l-pass">Password</label>
            <input id="l-pass" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <p id="l-error" class="lc-error" hidden></p>
          <button type="submit" class="lc-btn" id="l-btn">Sign in</button>
          <button type="button" class="small btn-secondary" id="l-toggle-mode">Create account</button>
        </form>
      </div>
    </div>

    <div id="app" class="app-shell" style="display:none">
      <aside class="sidebar" id="left-sidebar">
        <header class="sidebar-head">
          <button id="brand-home" class="brand-link" type="button">Soci</button>
          <button id="collapse-left-sidebar" class="small" type="button">Collapse</button>
        </header>
        <div class="sidebar-body">
          <p class="subtle">Social planning workspace</p>
          <div class="sidebar-actions">
            <button id="create-post" class="primary" type="button">+ New Post</button>
            <button id="manage-users" class="small" type="button">Manage Users</button>
            <div class="action-row">
              <button id="new-client" class="small icon-btn action-btn" type="button">
                <i data-lucide="user-plus" aria-hidden="true"></i>
                <span>New Workspace</span>
              </button>
              <button id="delete-client" class="small icon-btn action-btn" type="button" title="Delete selected workspace">
                <i data-lucide="trash-2" aria-hidden="true"></i>
                <span>Delete Workspace</span>
              </button>
            </div>
            <div class="action-row">
              <button id="copy-share-link" class="small icon-btn action-btn" type="button">
                <i data-lucide="link-2" aria-hidden="true"></i>
                <span>Share Link</span>
              </button>
              <details class="export-menu">
                <summary class="small icon-btn action-btn">
                  <i data-lucide="download" aria-hidden="true"></i>
                  <span>Export</span>
                </summary>
                <div class="export-menu-list">
                  <button id="export-csv" class="small icon-btn action-btn" type="button">
                    <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                    <span>CSV</span>
                  </button>
                  <button id="export-ics" class="small icon-btn action-btn" type="button">
                    <i data-lucide="calendar-down" aria-hidden="true"></i>
                    <span>ICS</span>
                  </button>
                </div>
              </details>
            </div>
            <button id="sign-out" class="small btn-signout" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="view-title">Planning Workspace</h2>
            <span class="subtle" id="stats"></span>
          </div>
          <div class="view-toggles" aria-label="View toggles">
            <button id="toggle-kanban" data-view="kanban" class="tab active">Kanban</button>
            <button id="toggle-calendar" data-view="calendar" class="tab active">Calendar</button>
            <button id="toggle-grid" data-view="grid" class="tab">Grid</button>
          </div>
          <div class="workspace-controls">
            <button id="theme-toggle" class="small icon-btn" type="button" aria-label="Toggle theme">
              <i data-lucide="moon" aria-hidden="true"></i>
              <span>Dark</span>
            </button>
            <button id="reopen-left-sidebar" class="small icon-btn hidden" type="button">
              <i data-lucide="panel-left-open" aria-hidden="true"></i>
              <span>Menu</span>
            </button>
            <button id="reopen-right-sidebar" class="small icon-btn hidden" type="button">
              <i data-lucide="panel-right-open" aria-hidden="true"></i>
              <span>Details</span>
            </button>
          </div>
        </header>

        <section class="filterbar" aria-label="Planning filters">
          <select id="active-client" aria-label="Active workspace">
            <option value="">All Workspaces</option>
          </select>
          <input id="filter-query" type="search" placeholder="Search title, caption, tags..." />
          <select id="filter-platform" aria-label="Filter by platform">
            <option value="all">All Platforms</option>
            <option value="Instagram">Instagram</option>
            <option value="TikTok">TikTok</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="X">X</option>
          </select>
          <select id="filter-status" aria-label="Filter by status">
            <option value="all">All Statuses</option>
            <option value="idea">Idea</option>
            <option value="in-progress">In Progress</option>
            <option value="in-review">In Review</option>
            <option value="ready">Ready</option>
          </select>
          <select id="filter-assignee" aria-label="Filter by assignee">
            <option value="all">All Assignees</option>
          </select>
        </section>

        <section id="admin-user-panel" class="workspace-section hidden" aria-label="Admin user management">
          <header class="section-head">
            <h3>User Management</h3>
            <button id="collapse-admin-user" class="small" type="button">Collapse</button>
          </header>
          <div class="section-body">
            <div id="owner-console-panel" class="owner-console hidden" aria-live="polite">
              <div id="owner-console-stats" class="owner-stats"></div>
              <div class="owner-table-wrap">
                <table class="owner-table">
                  <thead>
                    <tr>
                      <th>User</th>
                      <th>Role</th>
                      <th>Status</th>
                      <th>Memberships</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="owner-users-body"></tbody>
                </table>
              </div>
            </div>
            <form id="admin-user-form" class="admin-user-form" autocomplete="off">
              <div class="row">
                <div class="field">
                  <label for="admin-user-name">Display Name</label>
                  <input id="admin-user-name" type="text" placeholder="e.g. Jamie Editor" required />
                </div>
                <div class="field">
                  <label for="admin-user-email">Email</label>
                  <input id="admin-user-email" type="email" placeholder="user@agency.com" required />
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="admin-user-role">Role</label>
                  <select id="admin-user-role">
                    <option value="client_user">Client User</option>
                    <option value="helper_staff">Helper Staff</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
                <div class="field">
                  <label for="admin-user-password">Temporary Password</label>
                  <input id="admin-user-password" type="password" minlength="8" placeholder="Minimum 8 characters" required />
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="admin-assign-membership">Assign to Workspace</label>
                  <select id="admin-assign-membership">
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                  </select>
                </div>
                <div class="field">
                  <label for="admin-membership-client">Workspace</label>
                  <select id="admin-membership-client">
                    <option value="">Select workspace...</option>
                  </select>
                </div>
              </div>

              <div class="field">
                <label for="admin-membership-permissions">Access Level</label>
                <select id="admin-membership-permissions">
                  <option value="view,comment">Viewer + Commenter</option>
                  <option value="view,comment,edit">Editor</option>
                  <option value="view,comment,edit,manage">Manager</option>
                </select>
              </div>

              <div id="admin-user-error" class="comment-error hidden" role="alert"></div>
              <div class="inspector-actions">
                <button id="admin-user-submit" class="save" type="submit">Create User</button>
                <button id="admin-user-cancel" class="btn-secondary" type="button">Close</button>
              </div>
            </form>
          </div>
        </section>

        <section id="workflow-section" class="workspace-section">
          <header class="section-head">
            <h3>Workflow</h3>
            <span id="kanban-overflow-hint" class="subtle hidden" aria-live="polite">More columns →</span>
            <button id="collapse-workflow" class="small" type="button">Collapse</button>
          </header>
          <div class="section-body">
            <section id="kanban-view" class="view"></section>
          </div>
        </section>

        <section id="schedule-section" class="workspace-section">
          <header class="section-head">
            <h3>Schedule</h3>
            <button id="collapse-schedule" class="small" type="button">Collapse</button>
          </header>
          <div class="section-body">
            <section id="calendar-view" class="view"></section>
          </div>
        </section>

        <section id="preview-section" class="workspace-section hidden">
          <header class="section-head">
            <h3>Profile Preview</h3>
            <button id="collapse-preview" class="small" type="button">Collapse</button>
          </header>
          <div class="section-body">
            <section id="grid-view" class="view"></section>
          </div>
        </section>
      </main>

      <aside class="inspector" id="inspector-panel">
        <div id="inspector-resize-handle" class="inspector-resize-handle" aria-hidden="true"></div>
        <header class="section-head inspector-head">
          <h3>Details</h3>
          <div class="inspector-head-actions">
            <button id="toggle-pin-inspector" class="small icon-btn" type="button" aria-label="Pin to sidebar">
              <span class="float-pin-icon"><i data-lucide="pin" aria-hidden="true"></i></span>
              <span class="pinned-unpin-icon"><i data-lucide="pin-off" aria-hidden="true"></i></span>
            </button>
            <button id="collapse-right-sidebar" class="small icon-btn" type="button" aria-label="Close">
              <i data-lucide="x" aria-hidden="true"></i>
            </button>
          </div>
        </header>
        <div class="inspector" id="inspector">
          <div class="empty">Select a post to edit</div>
        </div>
      </aside>
    </div>

    <template id="column-template">
      <section class="column">
        <header>
          <h3></h3>
          <span class="count"></span>
        </header>
        <div class="cards"></div>
      </section>
    </template>

    <template id="card-template">
      <article class="card" draggable="true">
        <h4></h4>
        <p class="meta"></p>
        <p class="excerpt"></p>
        <div class="card-footer">
          <span class="card-badge"></span>
          <span class="card-progress"></span>
        </div>
      </article>
    </template>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
